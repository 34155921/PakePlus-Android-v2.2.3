<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ESP01S 灯控面板</title>
  <style>
    :root{
      --purple:#6a00ff;
      --green:#13c100;
      --line:#e9e9e9;
      --bg:#ffffff;
      --text:#222;
      --muted:#666;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#fff;
      color:var(--text);
      font-family:Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .app{
      max-width:820px;
      margin:0 auto;
      padding:14px 14px 90px;
    }
    .title{
      text-align:center;
      color:var(--purple);
      font-size:26px;
      font-weight:700;
      margin:10px 0 16px;
    }
    .section{
      border-top:1px solid #efefef;
      padding-top:14px;
      margin-top:12px;
    }
    .section h2{
      color:var(--purple);
      text-align:center;
      font-size:20px;
      margin:0 0 14px;
    }
    .card{
      border:1px solid #ededed;
      border-radius:10px;
      background:#fff;
      padding:12px;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      margin:10px 0;
      flex-wrap:wrap;
    }
    .row label{
      min-width:120px;
      font-size:14px;
      color:#111;
    }
    .input, .select{
      flex:1;
      min-width:120px;
      height:38px;
      border:1px solid #d9d9d9;
      border-radius:6px;
      padding:0 10px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    .btn{
      border:none;
      height:38px;
      padding:0 14px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
      background:#f4f4f4;
      color:#111;
    }
    .btn-green{
      background:var(--green);
      color:#fff;
      font-weight:700;
    }
    .btn-purple{
      background:var(--purple);
      color:#fff;
      font-weight:700;
    }
    .btn-wide{
      width:100%;
      height:46px;
      font-size:18px;
      margin-top:10px;
    }
    .mini-btn{
      width:40px;
      height:34px;
      border:1px solid #d8d8d8;
      background:#fff;
      border-radius:6px;
      cursor:pointer;
      font-size:18px;
    }
    .top-status{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      text-align:center;
      font-size:14px;
      color:#333;
      margin-bottom:10px;
    }
    .slider-row{
      display:grid;
      grid-template-columns: 90px 1fr 54px 42px 42px;
      gap:8px;
      align-items:center;
      margin:10px 0;
    }
    .slider-row .name{
      font-size:14px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    input[type="range"]{
      width:100%;
    }
    .num{
      text-align:center;
      font-weight:700;
    }
    .tabs{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#fff;
      border-top:1px solid #ececec;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
      max-width:820px;
      margin:0 auto;
    }
    .tab{
      color:#0a0;
      font-size:14px;
      cursor:pointer;
    }
    .tab.active{
      color:#e00;
      font-weight:700;
    }
    .hidden{display:none}
    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
      line-height:1.5;
    }
    .channel-list{
      display:grid;
      gap:10px;
    }
    .channel-item{
      display:grid;
      grid-template-columns: 70px 1fr;
      gap:8px;
      align-items:center;
    }
    .hour-grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
    }
    .hour-btn{
      height:36px;
      border:1px solid #ddd;
      border-radius:6px;
      background:#fff;
      cursor:pointer;
    }
    .hour-btn.active{
      background:var(--purple);
      color:#fff;
      border-color:var(--purple);
    }
    @media (max-width: 520px){
      .top-status{grid-template-columns:repeat(2,1fr);}
      .slider-row{
        grid-template-columns: 64px 1fr 42px 34px 34px;
      }
      .hour-grid{grid-template-columns:repeat(4,1fr);}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">ESP01S 灯控面板</div>

    <div id="page-status" class="section">
      <h2>工作状态</h2>
      <div class="top-status">
        <div>自动模式：<span id="stAuto">--</span></div>
        <div>当前小时：<span id="stHour">--</span></div>
        <div>通道数：<span id="stCount">--</span></div>
        <div>连接：<span id="stConn">未连接</span></div>
      </div>
      <div class="card"><div id="statusChannels"></div></div>
      <button class="btn btn-green btn-wide" onclick="readStatus()">读取状态</button>
    </div>

    <div id="page-params" class="section hidden">
      <h2>参数设置</h2>
      <div class="row">
        <label>ESP01S 地址</label>
        <input id="espIp" class="input" value="http://192.168.4.1">
        <button class="btn btn-purple" onclick="saveEspIp()">保存</button>
      </div>
      <div class="row">
        <label>自动模式</label>
        <button id="autoBtn" class="btn btn-green" onclick="toggleAuto()">开启</button>
      </div>
      <div class="row">
        <label>当前小时(0-23)</label>
        <button class="mini-btn" onclick="changeHour(-1)">-</button>
        <input id="hourInput" class="input" style="max-width:80px;text-align:center" readonly value="0">
        <button class="mini-btn" onclick="changeHour(1)">+</button>
        <button class="btn" onclick="cycleHour()">循环</button>
      </div>
      <div class="row">
        <label>功率倍率</label>
        <button class="btn" onclick="scaleAll(1.1)">×1.1</button>
        <button class="btn" onclick="scaleAll(0.9)">×0.9</button>
        <button class="btn" onclick="copyHourToAll()">当前小时复制到全部</button>
      </div>
      <div class="card">
        <div class="row"><label>选择小时编辑</label><div id="hourGrid" class="hour-grid"></div></div>
        <div id="sliderBox"></div>
      </div>
      <button class="btn btn-green btn-wide" onclick="sendData()">发送数据到ESP01S</button>
      <button class="btn btn-green btn-wide" onclick="saveConfig()">保存配置到ESP01S</button>
      <button class="btn btn-green btn-wide" onclick="loadConfig()">从ESP01S加载配置</button>
    </div>

    <div id="page-system" class="section hidden">
      <h2>系统设置</h2>
      <div class="row">
        <label>通道数量(1~10)</label>
        <input id="channelCount" class="input" type="number" min="1" max="10" value="4">
        <button class="btn btn-purple" onclick="applyChannelCount()">应用</button>
      </div>
      <div class="row"><label>Wi-Fi名称</label><input id="wifiName" class="input"></div>
      <div class="row"><label>Wi-Fi密码</label><input id="wifiPwd" class="input" type="password"></div>
      <div class="card"><div id="channelNames"></div></div>
      <button class="btn btn-green btn-wide" onclick="sendWifi()">发送Wi-Fi配置</button>
      <button class="btn btn-green btn-wide" onclick="exportJson()">导出JSON</button>
      <button class="btn btn-green btn-wide" onclick="importJsonPrompt()">导入JSON</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showPage('status', this)">工作状态</div>
    <div class="tab" onclick="showPage('params', this)">参数设置</div>
    <div class="tab" onclick="showPage('system', this)">系统设置</div>
  </div>

  <script>
    const LS_KEY = 'esp01s_light_panel_v2';
    const defaultValues = () => Array.from({length:24}, () => 0);
    const state = {
      espIp: localStorage.getItem('espIp') || 'http://192.168.4.1',
      auto: true, currentHour:0, selectedHour:0, channelCount:4,
      channels: [
        {name:'白光',values:defaultValues()},{name:'蓝光',values:defaultValues()},
        {name:'红光',values:defaultValues()},{name:'绿光',values:defaultValues()},
        {name:'紫光',values:defaultValues()},{name:'冷白',values:defaultValues()},
        {name:'暖白',values:defaultValues()},{name:'UV',values:defaultValues()},
        {name:'泵',values:defaultValues()},{name:'风扇',values:defaultValues()}
      ],
      wifiName:'',wifiPwd:''
    };

    function saveLocal(){localStorage.setItem(LS_KEY,JSON.stringify(state));localStorage.setItem('espIp',state.espIp);}
    function loadLocal(){const s=localStorage.getItem(LS_KEY);if(s)Object.assign(state,JSON.parse(s));}
    function showPage(name,el){document.querySelectorAll('.section').forEach(x=>x.classList.add('hidden'));document.getElementById('page-'+name).classList.remove('hidden');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');}
    function setConn(text,ok=false){const el=document.getElementById('stConn');el.textContent=text;el.style.color=ok?'green':'red';}
    function renderHourGrid(){const box=document.getElementById('hourGrid');box.innerHTML='';for(let h=0;h<24;h++){const b=document.createElement('button');b.className='hour-btn'+(state.selectedHour===h?' active':'');b.textContent=h;b.onclick=()=>{state.selectedHour=h;document.getElementById('hourInput').value=h;renderHourGrid();renderSliders();saveLocal();};box.appendChild(b);}}
    function renderChannelNames(){const box=document.getElementById('channelNames');box.innerHTML='';for(let i=0;i<state.channelCount;i++){const row=document.createElement('div');row.className='channel-item';row.innerHTML=`<div>通道 ${i+1}</div><input class="input" value="${state.channels[i].name}" oninput="state.channels[${i}].name=this.value;saveLocal()">`;box.appendChild(row);}}
    function renderStatusChannels(){const box=document.getElementById('statusChannels');box.innerHTML='';for(let i=0;i<state.channelCount;i++){const v=state.channels[i].values[state.currentHour]??0;const row=document.createElement('div');row.className='row';row.style.display='grid';row.style.gridTemplateColumns='1fr auto';row.innerHTML=`<div>${state.channels[i].name}</div><div style="font-weight:700">${v}</div>`;box.appendChild(row);}document.getElementById('stAuto').textContent=state.auto?'开':'关';document.getElementById('stHour').textContent=state.currentHour;document.getElementById('stCount').textContent=state.channelCount;}
    function renderSliders(){const box=document.getElementById('sliderBox');box.innerHTML='';for(let i=0;i<state.channelCount;i++){const v=state.channels[i].values[state.selectedHour]??0;const row=document.createElement('div');row.className='slider-row';row.innerHTML=`<div class="name">${state.channels[i].name}</div><input type="range" min="0" max="100" value="${v}" oninput="setChannelValue(${i}, this.value)"><button class="mini-btn" onclick="stepChannel(${i}, -1)">-</button><div class="num" id="num-${i}">${v}</div><button class="mini-btn" onclick="stepChannel(${i}, 1)">+</button>`;box.appendChild(row);}}
    function setChannelValue(i,val){state.channels[i].values[state.selectedHour]=Number(val);const num=document.getElementById('num-'+i);if(num)num.textContent=val;renderStatusChannels();saveLocal();}
    function stepChannel(i,delta){let v=Number(state.channels[i].values[state.selectedHour]||0)+delta;v=Math.max(0,Math.min(100,v));state.channels[i].values[state.selectedHour]=v;renderSliders();renderStatusChannels();saveLocal();}
    function changeHour(delta){let h=state.currentHour+delta;h=Math.max(0,Math.min(23,h));state.currentHour=h;state.selectedHour=h;document.getElementById('hourInput').value=h;renderHourGrid();renderSliders();renderStatusChannels();saveLocal();}
    function cycleHour(){state.currentHour=(state.currentHour+1)%24;state.selectedHour=state.currentHour;document.getElementById('hourInput').value=state.currentHour;renderHourGrid();renderSliders();renderStatusChannels();saveLocal();}
    function toggleAuto(){state.auto=!state.auto;const btn=document.getElementById('autoBtn');btn.textContent=state.auto?'开启':'关闭';btn.className='btn '+(state.auto?'btn-green':'btn');renderStatusChannels();saveLocal();}
    function scaleAll(ratio){for(let i=0;i<state.channelCount;i++){let v=Number(state.channels[i].values[state.selectedHour]||0);v=Math.max(0,Math.min(100,Math.round(v*ratio)));state.channels[i].values[state.selectedHour]=v;}renderSliders();renderStatusChannels();saveLocal();}
    function copyHourToAll(){for(let i=0;i<state.channelCount;i++){state.channels[i].values[state.currentHour]=state.channels[i].values[state.selectedHour];}renderStatusChannels();saveLocal();alert('已复制');}
    function applyChannelCount(){let c=Number(document.getElementById('channelCount').value);c=Math.max(1,Math.min(10,c));state.channelCount=c;renderChannelNames();renderSliders();renderStatusChannels();saveLocal();}
    function saveEspIp(){state.espIp=document.getElementById('espIp').value.trim();saveLocal();alert('已保存');}
    function getConfig(){return{auto:state.auto,currentHour:state.currentHour,channelCount:state.channelCount,channels:state.channels.slice(0,state.channelCount).map(ch=>({name:ch.name,values:ch.values}))};}
    async function readStatus(){try{setConn('连接中...');const res=await fetch(state.espIp+'/api/status');const data=await res.json();state.auto=!!data.auto;state.currentHour=Number(data.currentHour??0);state.selectedHour=state.currentHour;state.channelCount=Number(data.channelCount??4);if(Array.isArray(data.channels)){data.channels.forEach((ch,idx)=>{if(state.channels[idx]){state.channels[idx].name=ch.name??'通道'+(idx+1);if(Array.isArray(ch.values))state.channels[idx].values=ch.values;}});}document.getElementById('hourInput').value=state.currentHour;document.getElementById('autoBtn').textContent=state.auto?'开启':'关闭';document.getElementById('autoBtn').className='btn '+(state.auto?'btn-green':'btn');document.getElementById('channelCount').value=state.channelCount;renderHourGrid();renderChannelNames();renderSliders();renderStatusChannels();saveLocal();setConn('已连接',true);}catch(e){setConn('失败');alert('失败：'+e.message);}}
    async function sendData(){try{const cfg=getConfig();await fetch(state.espIp+'/api/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});setConn('已发送',true);alert('发送成功');}catch(e){alert('失败：'+e.message);}}
    async function saveConfig(){try{const cfg=getConfig();await fetch(state.espIp+'/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});alert('保存成功');}catch(e){alert('失败：'+e.message);}}
    async function loadConfig(){try{const res=await fetch(state.espIp+'/api/load');const data=await res.json();state.auto=!!data.auto;state.currentHour=Number(data.currentHour??0);state.selectedHour=state.currentHour;state.channelCount=Number(data.channelCount??4);if(Array.isArray(data.channels)){data.channels.forEach((ch,idx)=>{if(state.channels[idx]){state.channels[idx].name=ch.name??'通道'+(idx+1);if(Array.isArray(ch.values))state.channels[idx].values=ch.values;}});}document.getElementById('hourInput').value=state.currentHour;document.getElementById('autoBtn').textContent=state.auto?'开启':'关闭';document.getElementById('autoBtn').className='btn '+(state.auto?'btn-green':'btn');document.getElementById('channelCount').value=state.channelCount;renderHourGrid();renderChannelNames();renderSliders();renderStatusChannels();saveLocal();alert('加载成功');}catch(e){alert('失败：'+e.message);}}
    async function sendWifi(){try{const body={ssid:document.getElementById('wifiName').value.trim(),password:document.getElementById('wifiPwd').value.trim()};await fetch(state.espIp+'/api/wifi',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});alert('WiFi配置已发送');}catch(e){alert('失败：'+e.message);}}
    function exportJson(){const data=JSON.stringify(getConfig(),null,2);const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='config.json';a.click();}
    function importJsonPrompt(){const txt=prompt('粘贴JSON：');if(!txt)return;try{const data=JSON.parse(txt);state.auto=!!data.auto;state.currentHour=Number(data.currentHour??0);state.selectedHour=state.currentHour;state.channelCount=Number(data.channelCount??4);if(Array.isArray(data.channels)){data.channels.forEach((ch,idx)=>{if(state.channels[idx]){state.channels[idx].name=ch.name??'通道'+(idx+1);if(Array.isArray(ch.values))state.channels[idx].values=ch.values;}});}document.getElementById('hourInput').value=state.currentHour;document.getElementById('autoBtn').textContent=state.auto?'开启':'关闭';document.getElementById('autoBtn').className='btn '+(state.auto?'btn-green':'btn');document.getElementById('channelCount').value=state.channelCount;renderHourGrid();renderChannelNames();renderSliders();renderStatusChannels();saveLocal();alert('导入成功');}catch(e){alert('格式错误');}}
    function init(){loadLocal();document.getElementById('espIp').value=state.espIp;document.getElementById('hourInput').value=state.currentHour;document.getElementById('channelCount').value=state.channelCount;document.getElementById('autoBtn').textContent=state.auto?'开启':'关闭';document.getElementById('autoBtn').className='btn '+(state.auto?'btn-green':'btn');renderHourGrid();renderChannelNames();renderSliders();renderStatusChannels();}
    init();
  </script>
</body>
</html>
