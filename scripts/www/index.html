<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ESP01S 灯控</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 40px 20px;
      text-align: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #1a1a1a;
    }
    .wifi-box {
      background: #e8f4f8;
      padding: 15px;
      border-radius: 12px;
      margin: 0 auto 30px;
      max-width: 340px;
      color: #0056b3;
      font-size: 15px;
      line-height: 1.6;
    }
    #status {
      margin: 20px 0;
      font-size: 17px;
      font-weight: 500;
      min-height: 40px;
      color: #333;
    }
    .btn {
      width: 100%;
      max-width: 320px;
      padding: 22px;
      font-size: 18px;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 600;
      margin: 15px auto;
      cursor: pointer;
      display: block;
    }
    .on {
      background: #007bff;
    }
    .off {
      background: #dc3545;
    }
  </style>
</head>
<body>
  <h1>ESP01S 灯控系统</h1>
  <div class="wifi-box">
    📶 WiFi名称：led_666666<br>
    🔑 WiFi密码：88888888<br>
    🚫 必须关闭手机流量！
  </div>

  <div id="status">✅ 等待操作</div>

  <button class="btn on" onclick="control('ON')">打开 LED</button>
  <button class="btn off" onclick="control('OFF')">关闭 LED</button>

  <script>
    const espIP = "http://192.168.4.1";
    const status = document.getElementById("status");

    function control(cmd) {
      status.innerText = "发送指令中...";
      fetch(`${espIP}/${cmd}`)
        .then(res => res.text())
        .then(text => {
          status.innerText = text;
        })
        .catch(err => {
          status.innerText = "❌ 发送失败，请检查 WiFi";
        });
    }
  </script>
</body>
</html>
