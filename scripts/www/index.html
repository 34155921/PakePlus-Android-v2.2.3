<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>珊瑚灯WX - 网页模拟版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 80px;
            background-color: #ffffff;
        }

        .top-bar {
            text-align: center;
            padding: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            background-color: #ffffff;
            position: relative;
        }

        .top-title {
            font-size: 18px;
            color: #333;
        }

        .mode-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: #ffffff;
        }

        .auto-mode {
            display: flex;
            align-items: center;
        }

        .auto-text {
            font-size: 16px;
            color: #333;
            margin-right: 10px;
        }

        .toggle-switch {
            width: 60px;
            height: 30px;
            border-radius: 15px;
            background-color: #00cc00;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s ease;
            overflow: hidden;
        }

        .toggle-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: #fff;
            position: absolute;
            top: 2px;
            right: 2px;
            transition: right 0.3s ease;
        }

        .toggle-switch.manual {
            background-color: #cccccc;
        }

        .toggle-switch.manual .toggle-dot {
            right: 32px;
        }

        .time-point {
            font-size: 16px;
            color: #0066cc;
        }

        .time-adjust {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-btn {
            width: 25px;
            height: 25px;
            text-align: center;
            line-height: 25px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 18px;
            cursor: pointer;
            background-color: #fff;
        }

        .time-val {
            font-size: 16px;
            width: 40px;
            text-align: center;
        }

        .shortcut-btns {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background-color: #ffffff;
            gap: 10px;
        }

        .shortcut-btn {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            background-color: #fff;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .slider-container {
            padding: 10px 15px;
            background-color: #ffffff;
        }

        .slider-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            gap: 10px;
            height: 40px;
        }

        .slider-name {
            width: 60px;
            font-size: 16px;
            color: #333;
            flex-shrink: 0;
        }

        .slider-wrap {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            position: relative;
            overflow: visible;
            background-color: #eee;
            margin-right: 100px;
            min-width: 100px;
        }

        .slider-track {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            border-radius: 3px;
            width: 100%;
        }

        .slider-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #00cc00;
            border: 2px solid #ffffff;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            z-index: 15;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            left: 12px;
        }

        .value-adjust {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 85px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            flex-shrink: 0;
            z-index: 20;
            background-color: #ffffff;
            padding: 2px;
            border-radius: 4px;
        }

        .val-btn {
            width: 25px;
            height: 25px;
            text-align: center;
            line-height: 25px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 18px;
            cursor: pointer;
            background-color: #fff;
            position: relative;
            z-index: 21;
        }

        .val-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            background-color: #f0f0f0;
        }

        .val-display {
            font-size: 16px;
            width: 40px;
            text-align: center;
            position: relative;
            z-index: 21;
            font-weight: 500;
        }

        .func-btns {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background-color: #ffffff;
            gap: 10px;
        }

        .func-btn {
            flex: 1;
            padding: 12px 0;
            background-color: #00cc00;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .mode-data-container {
            padding: 0 15px 15px;
            background-color: #ffffff;
        }

        .mode-data-btns {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 5px;
        }

        .mode-data-btn {
            flex: 1;
            padding: 15px 0;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .mode-data-btn.active {
            color: #cc0000;
            font-weight: bold;
        }

        .dropdown-menu {
            display: none;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 15px;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item.active {
            color: #cc0000;
            font-weight: bold;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            max-width: 480px;
            margin: 0 auto;
            z-index: 9999;
        }

        .tab-item {
            text-align: center;
            font-size: 16px;
            cursor: pointer;
        }

        .tab-active {
            color: #cc0000;
            font-weight: bold;
        }

        .tab-normal {
            color: #009933;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        #page0 .header {
            text-align: center;
            padding: 15px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }

        #page0 .header-title {
            color: #6600cc;
            font-size: 20px;
        }

        #page0 .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            font-size: 14px;
            color: #666;
            background-color: #ffffff;
            flex-wrap: wrap;
            gap: 5px;
        }

        #page0 .channel-container {
            padding: 15px;
            background-color: #ffffff;
        }

        #page0 .channel-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            gap: 10px;
            width: 100%;
        }

        #page0 .channel-item {
            text-align: center;
            flex: 0 0 calc(25% - 10px);
            max-width: 80px;
            min-width: 60px;
        }

        #page0 .channel-name {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #page0 .circle-wrapper {
            width: 70px;
            height: 70px;
            margin: 0 auto;
            position: relative;
        }

        #page0 .circle-outer {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(var(--channel-color, #00cc00) var(--progress, 0%), #e0e0e0 0%);
            position: relative;
        }

        #page0 .circle-outer::after {
            content: '';
            position: absolute;
            width: 85%;
            height: 85%;
            border-radius: 50%;
            background-color: #fff;
        }

        #page0 .circle-inner {
            font-size: 18px;
            color: #666;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        #page0 .read-btn {
            width: 90%;
            height: 60px;
            line-height: 60px;
            background-color: #00cc00;
            color: #fff;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            margin: 0 auto;
            cursor: pointer;
            border: none;
            display: block;
        }

        #page2 {
            padding: 10px 15px;
        }

        #page2 .section-title {
            font-size: 20px;
            color: #6600cc;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
        }

        #page2 .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 18px;
        }

        #page2 .setting-label {
            color: #333;
        }

        #page2 .setting-input {
            color: #333;
            font-size: 18px;
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 120px;
            text-align: right;
            font-weight: 500;
            background-color: #f9f9f9;
            outline: none;
        }

        #page2 .setting-input.router-input {
            width: 180px;
            text-align: left;
        }

        .channel-save-btn {
            padding: 8px 16px;
            background-color: #00cc00;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        #page2 .btn-large {
            width: 100%;
            height: 60px;
            line-height: 60px;
            background-color: #00cc00;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            display: block;
        }

        #page2 .router-section {
            margin-top: 30px;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }

        .channel-name-section {
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }
        .channel-name-title {
            font-size: 16px;
            font-weight: bold;
            color: #6600cc;
            margin-bottom: 12px;
            text-align: center;
        }
        .name-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 8px;
        }
        .name-label {
            width: 60px;
            font-size: 14px;
            color: #333;
        }
        .name-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            user-select: text;
            outline: none;
        }
        .color-picker {
            width: 40px;
            height: 36px;
            border: none;
            cursor: pointer;
            background: transparent;
        }
        .channel-count-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="page active" id="page0">
    <div class="header">
        <div class="header-title">工作状态</div>
    </div>
    <div class="status-bar">
        <span id="modeStatus">自动模式</span>
        <span>23℃/24℃</span>
        <span>风扇:0%</span>
        <span id="realTime">12:12:12</span>
    </div>
    <div class="channel-container" id="statusChannelContainer">
        <button class="read-btn" onclick="readStatus()">读取状态</button>
    </div>
    <div class="tab-bar">
        <div class="tab-item tab-active" onclick="switchTab(0)">工作状态</div>
        <div class="tab-item tab-normal" onclick="switchTab(1)">参数设置</div>
        <div class="tab-item tab-normal" onclick="switchTab(2)">系统设置</div>
    </div>
</div>

<div class="page" id="page1">
    <div class="top-bar">
        <div class="top-title">水族灯控制系统</div>
    </div>
    <div class="mode-control">
        <div class="auto-mode">
            <div class="auto-text" id="modeText">自动模式</div>
            <div class="toggle-switch" id="autoToggle" onclick="toggleMode()">
                <div class="toggle-dot"></div>
            </div>
        </div>
        <div class="time-point">时间点 <span id="timePointText">0:00</span></div>
        <div class="time-adjust">
            <div class="time-btn" id="timeMinusBtn" onclick="adjustTime(-1)">-</div>
            <div class="time-val" id="timeVal">0</div>
            <div class="time-btn" id="timePlusBtn" onclick="adjustTime(1)">+</div>
        </div>
    </div>
    <div class="shortcut-btns">
        <button class="shortcut-btn" onclick="scalePower('plus')">功率×1.1</button>
        <button class="shortcut-btn" onclick="scalePower('minus')">功率×0.9</button>
        <button class="shortcut-btn" onclick="shiftTime(-1)">时间提前</button>
        <button class="shortcut-btn" onclick="shiftTime(1)">时间推迟</button>
    </div>
    <div class="slider-container" id="sliderContainer"></div>

    <div class="func-btns">
        <button class="func-btn" onclick="sendData()">发送数据</button>
        <button class="func-btn" onclick="readData()">读取数据</button>
        <button class="func-btn" onclick="autoPreview()">自动模式预览</button>
    </div>
    <div class="mode-data-container">
        <div class="mode-data-btns">
            <button class="mode-data-btn" onclick="toggleDropdown('loadMenu')">加载模式数据</button>
            <button class="mode-data-btn" onclick="toggleDropdown('saveMenu')">保存模式数据</button>
        </div>
        <div class="dropdown-menu" id="loadMenu">
            <div class="dropdown-item" onclick="selectLoadMode(this)">LPS模式数据</div>
            <div class="dropdown-item" onclick="selectLoadMode(this)">SPS模式数据</div>
            <div class="dropdown-item active" onclick="selectLoadMode(this)">爆藻模式数据</div>
            <div class="dropdown-item" onclick="selectLoadMode(this)">自定义A数据</div>
            <div class="dropdown-item" onclick="selectLoadMode(this)">自定义B数据</div>
            <div class="dropdown-item" onclick="selectLoadMode(this)">自定义C数据</div>
            <div class="dropdown-item" onclick="selectLoadMode(this)">自定义D数据</div>
        </div>
        <div class="dropdown-menu" id="saveMenu">
            <div class="dropdown-item" onclick="selectSaveMode(this)">自定义A数据</div>
            <div class="dropdown-item" onclick="selectSaveMode(this)">自定义B数据</div>
            <div class="dropdown-item" onclick="selectSaveMode(this)">自定义C数据</div>
            <div class="dropdown-item" onclick="selectSaveMode(this)">自定义D数据</div>
            <div class="dropdown-item active" onclick="selectSaveMode(this)">不保存数据</div>
        </div>
    </div>
    <div class="tab-bar">
        <div class="tab-item tab-normal" onclick="switchTab(0)">工作状态</div>
        <div class="tab-item tab-active" onclick="switchTab(1)">参数设置</div>
        <div class="tab-item tab-normal" onclick="switchTab(2)">系统设置</div>
    </div>
</div>

<div class="page" id="page2">
    <div class="section-title">系统设置</div>
    <div class="setting-item">
        <div class="setting-label">风扇启动温度(℃)</div>
        <input type="number" class="setting-input" id="fanTempVal" value="38" min="0" max="100">
    </div>
    <div class="setting-item">
        <div class="setting-label">风扇启动转速(%)</div>
        <input type="number" class="setting-input" id="fanSpeedVal" value="50" min="0" max="100" step="5">
    </div>
    <div class="setting-item">
        <div class="setting-label">热保护启动温度(℃)</div>
        <input type="number" class="setting-input" id="heatProtectVal" value="58" min="0" max="100">
    </div>

    <div class="setting-item">
        <div class="setting-label">通道总数量</div>
        <div class="channel-count-row">
            <input type="number" class="setting-input" id="channelCountVal" value="9" min="1" max="10">
            <button class="channel-save-btn" onclick="saveChannelCountManual()">保存</button>
        </div>
    </div>

    <button class="btn-large" onclick="sendSystemData()">发送数据并校时</button>
    <button class="btn-large" onclick="readSystemData()">读取数据</button>

    <div class="channel-name-section">
        <div class="channel-name-title">通道自定义名称 & 颜色</div>
        <div id="channelNameList"></div>
        <button class="btn-large" style="height:44px;line-height:44px;font-size:16px;margin-top:12px" onclick="saveAllChannelNames()">保存所有通道设置</button>
    </div>

    <div class="router-section">
        <div class="section-title">路由器设置</div>
        <div class="setting-item">
            <div class="setting-label">路由器名称:</div>
            <input type="text" class="setting-input router-input" id="routerName" value="Shanhu-1-9">
        </div>
        <div class="setting-item">
            <div class="setting-label">路由器密码:</div>
            <input type="text" class="setting-input router-input" id="routerPwd" value="hygy1234">
        </div>
        <button class="btn-large" onclick="sendRouterData()">发送数据</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item tab-normal" onclick="switchTab(0)">工作状态</div>
        <div class="tab-item tab-normal" onclick="switchTab(1)">参数设置</div>
        <div class="tab-item tab-active" onclick="switchTab(2)">系统设置</div>
    </div>
</div>

<script>
const MAX_CHANNELS = 10;
let channelCount = 9;
let channels = [];
let channelColors = ["#dcdcdc","#87cefa","#ee82ee","#00cc66","#e6e6fa","#0000cd","#ff3333","#ffff99","#fffacd","#9933ff"];
const allChannelKeys = ['ch1','ch2','ch3','ch4','ch5','ch6','ch7','ch8','ch9','ch10'];
const defaultNames = {
    ch1:'冷白',ch2:'浅蓝',ch3:'紫光',ch4:'青绿',ch5:'UvA',ch6:'深蓝',ch7:'红色',ch8:'暖白',ch9:'月光白',ch10:'通道10'
};

// 预设模式参数
const spsHourlyData = Array(24).fill().map(() => ({
    ch1:0, ch2:0, ch3:0, ch4:0, ch5:0, ch6:0, ch7:0, ch8:0, ch9:0
}));
spsHourlyData[8] = {ch1:5, ch2:21, ch3:12, ch4:11, ch5:6, ch6:23, ch7:2, ch8:5, ch9:3};
spsHourlyData[9] = {ch1:8, ch2:35, ch3:20, ch4:18, ch5:10, ch6:38, ch7:3, ch8:8, ch9:3};
spsHourlyData[10] = {ch1:11, ch2:50, ch3:29, ch4:25, ch5:14, ch6:54, ch7:4, ch8:11, ch9:3};
spsHourlyData[11] = {ch1:14, ch2:63, ch3:36, ch4:32, ch5:18, ch6:68, ch7:5, ch8:14, ch9:3};
spsHourlyData[12] = {ch1:15, ch2:70, ch3:40, ch4:35, ch5:20, ch6:75, ch7:5, ch8:15, ch9:3};
spsHourlyData[13] = {ch1:15, ch2:70, ch3:40, ch4:35, ch5:20, ch6:75, ch7:5, ch8:15, ch9:3};
spsHourlyData[14] = {ch1:14, ch2:63, ch3:36, ch4:32, ch5:18, ch6:68, ch7:5, ch8:14, ch9:3};
spsHourlyData[15] = {ch1:11, ch2:50, ch3:29, ch4:25, ch5:14, ch6:54, ch7:4, ch8:11, ch9:3};
spsHourlyData[16] = {ch1:8, ch2:35, ch3:20, ch4:18, ch5:10, ch6:38, ch7:3, ch8:8, ch9:3};
spsHourlyData[17] = {ch1:5, ch2:21, ch3:12, ch4:11, ch5:6, ch6:23, ch7:2, ch8:5, ch9:3};

const algaeHourlyData = Array(24).fill().map(() => ({
    ch1:0, ch2:0, ch3:0, ch4:0, ch5:0, ch6:0, ch7:0, ch8:0, ch9:0
}));
const algaeFixed = {ch1:100, ch2:30, ch3:0, ch4:0, ch5:0, ch6:40, ch7:100, ch8:60, ch9:100};
for(let h=5; h<=20; h++) {
    algaeHourlyData[h] = {...algaeFixed};
}

const defaultPresetModes = {
    "LPS模式数据": { ch1:30, ch2:60, ch3:20, ch4:45, ch5:15, ch6:15, ch7:25, ch8:10, ch9:3 },
    "SPS模式数据": spsHourlyData,
    "爆藻模式数据": algaeHourlyData,
    "自定义A数据":{}, "自定义B数据":{}, "自定义C数据":{}, "自定义D数据":{}
};

const defaultSystemSettings = {
    fanTemp:38,fanSpeed:50,heatProtect:58,channelCount:9,
    routerName:'Shanhu-1-9',routerPwd:'hygy1234'
};

let hourData = [];
let currentHour = 0;
let isAutoMode = true;
let previewVals = {};

// ====================== ESP8266 网络通讯核心代码 ======================
async function sendRequest(cmd, data = {}) {
    try {
        const response = await fetch('/api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cmd, ...data })
        });
        return await response.json();
    } catch (e) {
        alert("通讯失败：" + e.message);
        return null;
    }
}

// ====================== 原有本地存储逻辑 ======================
function saveToLocal(key,data){
    try{ localStorage.setItem(key, JSON.stringify(data)); }catch(e){ console.error('保存失败',e) }
}
function getFromLocal(key,def){
    try{ const d=localStorage.getItem(key); return d?JSON.parse(d):def; }catch(e){return def;}
}

function saveChannelCountManual(){
    channelCount=Math.max(1,Math.min(MAX_CHANNELS,parseInt(document.getElementById('channelCountVal').value)||9));
    const sys=getFromLocal('coralLightSystem',defaultSystemSettings);
    sys.channelCount=channelCount;
    saveToLocal('coralLightSystem',sys);
    initDynamicChannels();
    saveHourDataToLocal();
    renderAllPages();
    alert('通道数量已保存');
}

function initDynamicChannels(){
    channels=[];
    for(let i=1;i<=channelCount;i++)channels.push('ch'+i);
    let empty={};channels.forEach(ch=>empty[ch]=0);
    hourData=Array(24).fill().map(()=>({...empty}));
    previewVals={...hourData[currentHour]};
}

window.onload=function(){
    updateRealTime();setInterval(updateRealTime,1000);
    const sys=getFromLocal('coralLightSystem',defaultSystemSettings);
    channelCount=sys.channelCount;
    document.getElementById('channelCountVal').value=channelCount;
    initDynamicChannels();
    loadAllData();
    setTimeout(renderAllPages,0);
}

function loadAllData(){
    loadHourDataFromLocal();
    loadSystemSettings();
    loadChannelNamesFromLocal();
    loadChannelColorsFromLocal();
}

function renderAllPages(){
    renderStatusPage();
    renderSliderPage();
    renderChannelNameInputs();
    loadVals(previewVals);
    updateValBtnStates();
}

function renderStatusPage(){
    const c=document.getElementById('statusChannelContainer');
    const btn=c.querySelector('.read-btn');
    c.innerHTML='';
    const names=getFromLocal('coralLightChannelNames',defaultNames);
    const customColors=getFromLocal('coralLightChannelColors',{});
    let row=document.createElement('div');row.className='channel-row';
    let cnt=0;
    channels.forEach((ch,i)=>{
        if(cnt>=4){c.appendChild(row);row=document.createElement('div');row.className='channel-row';cnt=0;}
        const nm=names[ch]||defaultNames[ch];
        const progressVal = previewVals[ch] || 0;
        const color = customColors[ch] || channelColors[i % channelColors.length];
        row.innerHTML+=`
        <div class="channel-item">
            <div class="channel-name" id="label-${ch}">${nm}</div>
            <div class="circle-wrapper">
                <div class="circle-outer" id="circle-${ch}" style="--progress: ${progressVal}%; --channel-color: ${color}">
                    <div class="circle-inner" id="val-${ch}">${progressVal}</div>
                </div>
            </div>
        </div>`;
        cnt++;
    });
    c.appendChild(row);
    if(btn)c.appendChild(btn);
}

function renderSliderPage(){
    const c=document.getElementById('sliderContainer');c.innerHTML='';
    const names=getFromLocal('coralLightChannelNames',defaultNames);
    const customColors=getFromLocal('coralLightChannelColors',{});
    channels.forEach((ch,i)=>{
        const co=customColors[ch] || channelColors[i%channelColors.length];
        const nm=names[ch]||defaultNames[ch];
        const val = previewVals[ch] || 0;
        const minusDisabled = val <= 0 ? 'disabled' : '';
        const plusDisabled = val >= 100 ? 'disabled' : '';

        c.innerHTML+=`
        <div class="slider-item">
            <div class="slider-name">${nm}</div>
            <div class="slider-wrap" id="wrap-${ch}">
                <div class="slider-track" id="track-${ch}" style="width:${val}%;background:${co}"></div>
                <div class="slider-thumb" id="thumb-${ch}" style="left:calc(${val}% - 12px)" onmousedown="startDrag(event,'${ch}')" ontouchstart="startDrag(event,'${ch}')"></div>
            </div>
            <div class="value-adjust">
                <div class="val-btn ${minusDisabled}" id="minus-${ch}" onclick="adjustVal('${ch}',-1)">-</div>
                <div class="val-display" id="disp-${ch}">${val}</div>
                <div class="val-btn ${plusDisabled}" id="plus-${ch}" onclick="adjustVal('${ch}',1)">+</div>
            </div>
        </div>`;
    });
}

function renderChannelNameInputs(){
    const list=document.getElementById('channelNameList');list.innerHTML='';
    const names=getFromLocal('coralLightChannelNames',defaultNames);
    const customColors=getFromLocal('coralLightChannelColors',{});
    channels.forEach((ch,i)=>{
        const nm=names[ch]||defaultNames[ch];
        const color=customColors[ch]||channelColors[i%channelColors.length];
        list.innerHTML+=`
        <div class="name-row">
            <div class="name-label">${defaultNames[ch]}</div>
            <input type="text" class="name-input" id="name-${ch}" value="${nm}">
            <input type="color" class="color-picker" id="color-${ch}" value="${color}">
        </div>`;
    });
}

function saveAllChannelNames(){
    const allNames=getFromLocal('coralLightChannelNames',{...defaultNames});
    const allColors=getFromLocal('coralLightChannelColors',{});
    channels.forEach(ch=>{
        const e=document.getElementById('name-'+ch);
        const c=document.getElementById('color-'+ch);
        if(e)allNames[ch]=e.value.trim()||defaultNames[ch];
        if(c)allColors[ch]=c.value;
    });
    saveToLocal('coralLightChannelNames',allNames);
    saveToLocal('coralLightChannelColors',allColors);
    renderAllPages();
    alert('通道名称与颜色已保存');
}

function loadChannelColorsFromLocal(){}
function loadChannelNamesFromLocal(){}

function updateRealTime(){
    const d=new Date();
    const h=String(d.getHours()).padStart(2,'0');
    const m=String(d.getMinutes()).padStart(2,'0');
    const s=String(d.getSeconds()).padStart(2,'0');
    const e=document.getElementById('realTime');
    if(e)e.innerText=`${h}:${m}:${s}`;
}

function switchTab(i){
    document.querySelectorAll('.page').forEach((p,k)=>{
        p.classList.toggle('active',k===i);
        if(k === 1) updateValBtnStates();
    });
    document.querySelectorAll('.tab-item').forEach((item, idx) => {
        if(idx === i) {
            item.classList.remove('tab-normal');
            item.classList.add('tab-active');
        } else {
            item.classList.remove('tab-active');
            item.classList.add('tab-normal');
        }
    });
}

function adjustTime(s){
    hourData[currentHour]={...previewVals};
    currentHour=(currentHour+s+24)%24;
    document.getElementById('timeVal').innerText=currentHour;
    document.getElementById('timePointText').innerText=`${currentHour}:00`;
    loadVals(hourData[currentHour]);
    updateValBtnStates();
}

function shiftTime(offset){
    const newHourData = Array(24).fill().map(() => {
        const empty = {};
        channels.forEach(ch => empty[ch] = 0);
        return empty;
    });
    for(let h=0;h<24;h++){
        const srcH = (h - offset + 24) % 24;
        newHourData[h] = {...hourData[srcH]};
    }
    hourData = newHourData;
    loadVals(hourData[currentHour]);
    updateValBtnStates();
    saveHourDataToLocal();
    alert(`时间已${offset>0?'推迟':'提前'}${Math.abs(offset)}小时`);
}

function adjustVal(ch,s){
    let v=previewVals[ch]+s;
    v=Math.max(0,Math.min(100,v));
    previewVals[ch]=v;
    updateSlider(ch,v);
    updateValBtnStates();
}

function updateSlider(ch,v){
    const d=document.getElementById('disp-'+ch);
    const t=document.getElementById('track-'+ch);
    const h=document.getElementById('thumb-'+ch);
    const circle = document.getElementById('circle-'+ch);
    const customColors=getFromLocal('coralLightChannelColors',{});
    const idx=channels.indexOf(ch);
    const color=customColors[ch]||channelColors[idx%channelColors.length];

    if(d)d.innerText=v;
    const percentage = Math.min(v, 100);
    if(t)t.style.width = `${percentage}%`;
    if(h)h.style.left = `calc(${percentage}% - 12px)`;
    if(circle) {
        circle.style.setProperty('--progress', `${percentage}%`);
        circle.style.setProperty('--channel-color', color);
    }
    sync(ch);
}

function updateValBtnStates(){
    channels.forEach(ch => {
        const val = previewVals[ch] || 0;
        const minusBtn = document.getElementById(`minus-${ch}`);
        const plusBtn = document.getElementById(`plus-${ch}`);
        if(minusBtn) minusBtn.classList.toggle('disabled', val <= 0);
        if(plusBtn) plusBtn.classList.toggle('disabled', val >= 100);
    });
}

function loadVals(v){
    previewVals={...v};
    channels.forEach(ch=>{updateSlider(ch,previewVals[ch]);sync(ch);});
    updateValBtnStates();
}

function sync(ch){
    const e=document.getElementById('val-'+ch);
    const circle = document.getElementById('circle-'+ch);
    const val = previewVals[ch] || 0;
    if(e)e.innerText=val;
    if(circle) circle.style.setProperty('--progress', `${val}%`);
}

function toggleMode(){
    isAutoMode=!isAutoMode;
    const t=document.getElementById('autoToggle');
    const txt=document.getElementById('modeText');
    const stat=document.getElementById('modeStatus');
    if(isAutoMode){t.classList.remove('manual');txt.innerText='自动模式';stat.innerText='自动模式';}
    else{t.classList.add('manual');txt.innerText='手动模式';stat.innerText='手动模式';}
}

function toggleDropdown(id){
    const m=document.getElementById(id);
    document.querySelectorAll('.dropdown-menu').forEach(x=>x!==m&&x.classList.remove('show'));
    m.classList.toggle('show');
}

function selectLoadMode(e){
    document.querySelectorAll('#loadMenu .dropdown-item').forEach(i=>i.classList.remove('active'));
    e.classList.add('active');
    const modeName = e.innerText;
    let loadData = {};
    if(modeName === 'SPS模式数据'){
        loadData = {...spsHourlyData[currentHour]};
        hourData = JSON.parse(JSON.stringify(spsHourlyData));
    } else if(modeName === '爆藻模式数据'){
        loadData = {...algaeHourlyData[currentHour]};
        hourData = JSON.parse(JSON.stringify(algaeHourlyData));
    } else {
        const dat=getFromLocal('coralLightModes',defaultPresetModes)[modeName]||{};
        loadData = dat;
        if(Object.keys(dat).length === 0){
            channels.forEach(ch => loadData[ch] = 0);
        }
    }
    loadVals(loadData);
    saveHourDataToLocal();
}

function selectSaveMode(e){
    document.querySelectorAll('#saveMenu .dropdown-item').forEach(i=>i.classList.remove('active'));
    e.classList.add('active');
    const t=e.innerText;
    if(t!=='不保存数据'){
        const s=getFromLocal('coralLightModes',defaultPresetModes);
        s[t]={...previewVals};
        saveToLocal('coralLightModes',s);
        alert('已保存:'+t);
    }
}

function scalePower(type){
    for(let h=0;h<24;h++){
        channels.forEach(ch=>{
            let v=hourData[h][ch];
            if(type==='plus')v=Math.min(100,Math.round(v*1.1));
            else v=Math.max(0,Math.round(v*0.9));
            hourData[h][ch]=v;
        });
    }
    previewVals={...hourData[currentHour]};
    loadVals(previewVals);
    updateValBtnStates();
    saveHourDataToLocal();
    alert('24小时功率已统一 '+ (type==='plus'?'×1.1':'×0.9'));
}

function startDrag(e,ch){
    e.preventDefault();
    const wrap=document.getElementById('wrap-'+ch);
    if(!wrap) return;
    const r=wrap.getBoundingClientRect();
    const w=r.width;

    function move(ev){
        ev.preventDefault();
        const x=ev.clientX||(ev.touches && ev.touches[0].clientX);
        if(x === undefined) return;
        const p=Math.max(0,Math.min(1,(x - r.left)/w));
        const v=Math.round(p*100);
        previewVals[ch]=v;
        updateSlider(ch,v);
        sync(ch);
    }

    function end(){
        document.removeEventListener('mousemove',move);
        document.removeEventListener('mouseup',end);
        document.removeEventListener('touchmove',move);
        document.removeEventListener('touchend',end);
        hourData[currentHour]={...previewVals};
        updateValBtnStates();
        saveHourDataToLocal();
    }

    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',end);
    document.addEventListener('touchmove',move, {passive: false});
    document.addEventListener('touchend',end);
}

function saveHourDataToLocal(){saveToLocal('coralLightHourData',hourData);}
function loadHourDataFromLocal(){hourData=getFromLocal('coralLightHourData',hourData);}
function loadSystemSettings(){
    const s=getFromLocal('coralLightSystem',defaultSystemSettings);
    document.getElementById('fanTempVal').value=s.fanTemp;
    document.getElementById('fanSpeedVal').value=s.fanSpeed;
    document.getElementById('heatProtectVal').value=s.heatProtect;
    document.getElementById('routerName').value=s.routerName;
    document.getElementById('routerPwd').value=s.routerPwd;
}

function autoPreview(){
    let previewHour = 0;
    const previewInterval = setInterval(() => {
        currentHour = previewHour % 24;
        document.getElementById('timeVal').innerText=currentHour;
        document.getElementById('timePointText').innerText=`${currentHour}:00`;
        loadVals(hourData[currentHour]);
        previewHour++;
        if(previewHour > 24) clearInterval(previewInterval);
    }, 300);
    alert('自动模式预览已启动');
}
